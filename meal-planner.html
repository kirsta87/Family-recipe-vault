<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="theme-color" content="#914b43">
  <title>Meal Planner · Glaister Family Recipe Vault</title>
  <link rel="stylesheet" href="styles-v104.css?v=104">
</head>
<body>
<header class="subpage-hero planner-page-hero">
  <div>
    <p class="eyebrow">THE GLAISTER FAMILY</p>
    <h1>Meal Planner</h1>
    <p>Plan any week without losing the weeks before it.</p>
  </div>
  <a class="secondary linkbtn" href="index.html">Back to Recipe Vault</a>
</header>

<div id="fatalError" class="fatal" hidden></div>

<main class="planner-page">
  <section class="planner-week-toolbar panel">
    <button id="previousWeek" class="secondary" type="button">Previous week</button>
    <div class="planner-week-heading">
      <p class="eyebrow">PLANNING WEEK</p>
      <h2 id="weekTitle"></h2>
      <p id="weekStatus" class="muted" aria-live="polite"></p>
    </div>
    <div class="planner-week-actions">
      <button id="thisWeek" class="secondary" type="button">This week</button>
      <button id="nextWeek" class="secondary" type="button">Next week</button>
    </div>
  </section>

  <section id="plannerGrid" class="planner-week-grid" aria-label="Weekly meal plan"></section>

  <section class="planner-history panel">
    <div>
      <p class="eyebrow">SAVED WEEKS</p>
      <h2>Meal plan history</h2>
      <p class="muted">Weeks stay here after you move forward. Open any saved week to review or change it.</p>
    </div>
    <div id="savedWeeks" class="saved-weeks"></div>
  </section>
</main>

<script src="config.js?v=3"></script>
<script src="meal-planner-v104.js?v=104"></script>
</body>
</html>
