<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Glaister Family Recipe Vault</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
<header class="hero">
  <div>
    <p class="eyebrow">THE GLAISTER FAMILY</p>
    <h1>Recipe Vault</h1>
    <p>Find dinner without scrolling until your soul leaves your body.</p>
  </div>
  <div class="actions">
    <button id="plannerBtn" class="secondary">Meal planner</button>
    <button id="manageBtn" class="secondary">Manage</button>
    <button id="addRecipeBtn" class="primary">＋ Add recipe</button>
  </div>
</header>

<main class="layout">
  <aside class="panel">
    <label>Search recipes
      <input id="searchInput" type="search" placeholder="chicken, tacos, creamy…">
    </label>

    <h3>Protein</h3>
    <div id="proteinFilters"></div>

    <h3>Meal type</h3>
    <div id="typeFilters"></div>

    <h3>Automatic filters</h3>
    <label class="check"><input id="kirstaFavorites" type="checkbox"> Kirsta’s favorites</label>
    <label class="check"><input id="tjFavorites" type="checkbox"> TJ’s favorites</label>
    <label class="check"><input id="torrinFavorites" type="checkbox"> Torrin’s safe foods</label>
    <label class="check"><input id="quickOnly" type="checkbox"> Quick meals (30 min or less)</label>
    <label class="check"><input id="showHidden" type="checkbox"> Show hidden recipes</label>

    <button id="clearFiltersBtn" class="secondary full">Clear filters</button>
  </aside>

  <section>
    <div class="toolbar">
      <strong id="resultCount">0 recipes</strong>
      <span id="syncStatus"></span>
    </div>
    <div id="recipeGrid" class="grid"></div>
  </section>
</main>

<dialog id="manageDialog">
  <button class="close" id="closeManageBtn">×</button>
  <h2>Manage your vault</h2>
  <label>Google Sheet CSV URL
    <input id="sheetUrlInput" type="url">
  </label>
  <label>Apps Script web-app URL
    <input id="appsScriptUrlInput" type="url">
  </label>
  <label>Family write key
    <input id="sharedKeyInput" type="password">
  </label>
  <button id="saveSharedSettingsBtn" class="primary">Save shared settings</button>
</dialog>

<dialog id="addDialog">
  <button class="close" id="closeAddBtn">×</button>
  <h2>Add recipe</h2>
  <form id="addForm">
    <label>HelloFresh recipe URL
      <input id="recipeUrlInput" type="url" required>
    </label>
    <button class="primary" type="submit">Save recipe</button>
  </form>
</dialog>

<dialog id="recipeDialog" class="wide">
  <button class="close" id="closeRecipeBtn">×</button>
  <h2 id="recipeTitle"></h2>
  <p id="recipeMeta"></p>

  <div class="ratings">
    <div><span>Kirsta</span><div id="kirstaStars"></div></div>
    <div><span>TJ</span><div id="tjStars"></div></div>
    <div><span>Torrin</span><div id="torrinStars"></div></div>
  </div>

  <iframe id="pdfViewer" title="Recipe card"></iframe>

  <label>Family notes
    <textarea id="notesInput" rows="3"></textarea>
  </label>

  <div class="actions">
    <button id="saveNotesBtn" class="secondary">Save notes</button>
    <button id="madeBtn" class="secondary">Made this</button>
    <button id="hideBtn" class="danger">Hide recipe</button>
    <a id="recipePageLink" class="secondary linkbtn" target="_blank" rel="noopener">Original page</a>
    <a id="pdfLink" class="secondary linkbtn" target="_blank" rel="noopener">Open PDF</a>
  </div>
</dialog>

<dialog id="plannerDialog">
  <button class="close" id="closePlannerBtn">×</button>
  <h2>Weekly meal planner</h2>
  <div id="plannerDays"></div>
</dialog>

<script src="config.js"></script>
<script src="app.js"></script>
</body>
</html>
